name: Publish Extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          PATCH=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))
          RELEASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $RELEASE_VERSION"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is not set. Add it in GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi
          npx @vscode/vsce publish "${{ steps.version.outputs.release_version }}" -p "$VSCE_PAT"
